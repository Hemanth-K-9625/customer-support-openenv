spec_version: 1
name: customer_support_env
description: >
  A customer support RL environment where an AI agent learns to resolve 
  user issues through actions like refund, apologize, and escalate.
  The environment provides step-by-step rewards based on agent performance.

type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  easy:
    description: "User requests a refund. Agent must issue a refund."
    initial_action: refund
    max_steps: 10

  medium:
    description: "Order is delayed. Agent must apologize and provide status update."
    initial_action: apologize
    max_steps: 10

  hard:
    description: "Angry user with multiple issues. Agent must apologize, investigate, refund and close case."
    initial_action: apologize
    max_steps: 10

entrypoints:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"